<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUTEMUSIC — gemagus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== BACKGROUND GRID / GLOW ===== -->
<div class="bg-grid" aria-hidden="true"></div>
<div class="bg-glow bg-glow--cyan" aria-hidden="true"></div>
<div class="bg-glow bg-glow--magenta" aria-hidden="true"></div>

<!-- ===== NAVBAR ===== -->
<header class="navbar" id="navbar">
  <div class="navbar__inner">
    <a href="#top" class="logo" aria-label="FLUTEMUSIC home">
      <span class="logo__eq" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </span>
      <span class="logo__text">NEORODU<span class="logo__accent">MUSIC</span></span>
    </a>

    <button class="hamburger" id="hamburgerBtn" aria-label="Buka menu" aria-expanded="false" aria-controls="navMenu">
      <span></span><span></span><span></span>
    </button>
  </div>

  <nav class="nav-menu" id="navMenu">
    <a href="#top" class="nav-menu__link" data-menu-link>Beranda</a>
    <a href="#musisi" class="nav-menu__link" data-menu-link>Musisi</a>
    <a href="#tracklist" class="nav-menu__link" data-menu-link>Tracklist</a>
    <a href="#player" class="nav-menu__link" data-menu-link>Player</a>
    <a href="#footer" class="nav-menu__link" data-menu-link>Kontak</a>
  </nav>
</header>

<main id="top">

  
  <section class="hero" id="musisi" aria-label="Slideshow musisi">
    <div class="slideshow" id="slideshow">
      
    </div>

    <div class="hero__scanline" aria-hidden="true"></div>

    <div class="hero__caption glass">
      <p class="hero__eyebrow" id="slideEyebrow">SESI // 01</p>
      <h2 class="hero__title" id="slideTitle">—</h2>
      <p class="hero__desc" id="slideDesc">—</p>
    </div>

    <div class="hero__dots" id="slideDots" role="tablist" aria-label="Pilih slide"></div>

    <button class="hero__nav hero__nav--prev" id="slidePrev" aria-label="Slide sebelumnya">‹</button>
    <button class="hero__nav hero__nav--next" id="slideNext" aria-label="Slide berikutnya">›</button>
  </section>

  
  <section class="tracklist-section" id="tracklist">
    <div class="section-head">
      <p class="section-eyebrow">BERBICARA DALAM DIAM</p>
      <h2 class="section-title">Lagu</h2>
      <p class="section-sub">Kumpulan &amp; rekaman — diputar mengheningkan cipta di mulai.</p>
    </div>

    <div class="tracklist" id="trackList" role="list">
      
    </div>
  </section>

</main>

<!-- ===== STICKY PLAYER ===== -->
<section class="player glass" id="player" aria-label="Pemutar musik">
  <audio id="audioEl" preload="metadata"></audio>

  <div class="player__track">
    <div class="player__art" id="playerArt" aria-hidden="true"></div>
    <div class="player__meta">
      <p class="player__title" id="playerTitle">Pilih lagu</p>
      <p class="player__artist" id="playerArtist">FLUTEMUSIC</p>
    </div>
    <div class="player__viz" id="playerViz" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="player__center">
    <div class="player__controls">
      <button class="ctrl-btn" id="prevBtn" aria-label="Track sebelumnya">⏮</button>
      <button class="ctrl-btn ctrl-btn--play" id="playBtn" aria-label="Putar / Jeda">▶</button>
      <button class="ctrl-btn" id="nextBtn" aria-label="Track berikutnya">⏭</button>
    </div>
    <div class="player__seek">
      <span class="time-mono" id="timeCurrent">0:00</span>
      <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1" aria-label="Posisi lagu">
      <span class="time-mono" id="timeDuration">0:00</span>
    </div>
  </div>

  <div class="player__fx">
    <div class="fx-control">
      <label for="bassRange">BASS</label>
      <input type="range" id="bassRange" min="-20" max="20" value="0" step="1">
    </div>
    <div class="fx-control">
      <label for="trebleRange">TREBLE</label>
      <input type="range" id="trebleRange" min="-20" max="20" value="0" step="1">
    </div>
    <div class="fx-control fx-control--vol">
      <label for="volRange">VOL</label>
      <input type="range" id="volRange" min="0" max="100" value="80" step="1">
    </div>
  </div>
</section>

<!-- ===== FOOTER ===== -->
<footer class="footer" id="footer">
  <div class="footer__inner">
    <div class="footer__brand">
      <span class="logo__eq" aria-hidden="true"><span></span><span></span><span></span><span></span></span>
      <span class="footer__brandname">FLUTEMUSIC</span>
    </div>

    <div class="footer__social">
      <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="Facebook">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M22 12.06C22 6.5 17.52 2 12 2S2 6.5 2 12.06C2 17.08 5.66 21.23 10.44 22v-7.03H7.9v-2.91h2.54V9.86c0-2.5 1.49-3.89 3.78-3.89 1.1 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56v1.87h2.78l-.44 2.91h-2.34V22C18.34 21.23 22 17.08 22 12.06z"/></svg>
        <span>Facebook</span>
      </a>
      <a href="https://youtube.com" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="YouTube">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M23.5 6.19a3.02 3.02 0 0 0-2.12-2.14C19.51 3.5 12 3.5 12 3.5s-7.51 0-9.38.55A3.02 3.02 0 0 0 .5 6.19 31.6 31.6 0 0 0 0 12a31.6 31.6 0 0 0 .5 5.81 3.02 3.02 0 0 0 2.12 2.14c1.87.55 9.38.55 9.38.55s7.51 0 9.38-.55a3.02 3.02 0 0 0 2.12-2.14A31.6 31.6 0 0 0 24 12a31.6 31.6 0 0 0-.5-5.81zM9.6 15.5v-7l6.2 3.5-6.2 3.5z"/></svg>
        <span>YouTube</span>
      </a>
    </div>

    <p class="footer__copy">© <span id="year"></span> FLUTEMUSIC. Seluruh materi audio dilindungi oleh Gemagus.</p>
  </div>
</footer>

<script src="music-data.js"></script>
<script src="app.js"></script>
</body>
</html>
