<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glass Music - Tuying Vibes 🎶</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298, #0f2027); /* misty ambient gradient */
      color: white;
      padding: 40px 20px;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 3rem;
      background: linear-gradient(90deg, #a1c4fd, #c2e9fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .subtitle { opacity: 0.8; font-size: 1.2rem; }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 2fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .album-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.37);
      transition: all 0.4s ease;
      text-decoration: none;
      color: white;
      display: block;
     
    }
    .album-card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .album-cover {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .album-info {
      padding: 20px;
      text-align: center;
    }
    .album-title {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .album-desc {
      font-size: 1rem;
      opacity: 0.8;
      margin-bottom: 15px;
    }
    .play-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 1.1rem;
      padding: 12px 30px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .play-btn:hover {
      background: rgba(255,255,255,0.4);
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <header>
    <h1>Gemagus Music</h1>
    <p class="subtitle">Koleksi🎧</p>
  </header>

  <div class="grid-container">

    <!-- Album 1: Whispers Over The Water -->
    <a href="index.html" class="album-card"> 
      <img src="https://archive.org/download/whispers-over-the-water-1/__ia_thumb.jpg" alt="Whispers Cover" class="album-cover">
      <div class="album-info">
        <div class="album-title">Whispers Over The Water (1)</div>
        <div class="album-desc">Misty ambient tracks by Gemagus</div>

      </div>
    </a>

    <!-- Album 2: Cinematic -->
    <a href="player.html" class="album-card">
      <img src="https://archive.org/download/whispers-over-the-water-1/__ia_thumb.jpg" alt="Cinematic Cover" class="album-cover">
      <div class="album-info">
        <div class="album-title">Cinematic</div>
        <div class="album-desc">Epic & emotional instrumentals</div>

      </div>
    </a>
    <a href="player.html" class="album-card">
      <img src="https://archive.org/download/whispers-over-the-water-1/__ia_thumb.jpg" alt="Cinematic Cover" class="album-cover">
      <div class="album-info">
        <div class="album-title">Cinematic</div>
        <div class="album-desc">Epic & emotional instrumentals</div>

      </div>
    </a>
   
    <a href="player.html" class="album-card">
      <img src="https://archive.org/download/whispers-over-the-water-1/__ia_thumb.jpg" alt="New Album" class="album-cover">
      <div class="album-info">
        <div class="album-title">Coming Soon</div>
        <div class="album-desc">More vibes incoming...</div>

      </div>
    </a>

  </div>

</body>
</html>
