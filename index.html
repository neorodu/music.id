<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEORODU • Music</title>
  
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap">
  
  <!-- CSS File -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-white overflow-x-hidden">

  <!-- Navbar -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <button id="hamburger" class="lg:hidden text-3xl focus:outline-none">
        <i class="fas fa-bars"></i>
      </button>

      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-2xl font-bold logo-font">
          K
        </div>
        <h1 class="logo-font text-3xl font-semibold tracking-tighter neon-text">neorodu</h1>
      </div>

      <div class="hidden lg:flex items-center gap-10 text-lg">
        <a href="#" class="hover:text-purple-400 transition">Home</a>
        <a href="#" class="hover:text-purple-400 transition">Discover</a>
        <a href="#" class="hover:text-purple-400 transition">Albums</a>
        <a href="#" class="hover:text-purple-400 transition">Artists</a>
        <a href="#" class="hover:text-purple-400 transition">Radio</a>
      </div>

      <div class="flex items-center gap-4">
        <button class="px-6 py-2.5 bg-white/10 hover:bg-white/20 rounded-2xl transition flex items-center gap-2">
          <i class="fas fa-search"></i>
        </button>
        <button class="px-8 py-2.5 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-medium hover:scale-105 transition">
          Login
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero Slideshow -->
  <div class="relative h-screen pt-20" id="hero">
    <div id="slideshow" class="absolute inset-0">
      <div class="slide absolute inset-0 bg-cover bg-center" style="background-image: url('https://picsum.photos/id/1015/1920/1080')"></div>
      <div class="slide absolute inset-0 bg-cover bg-center" style="background-image: url('https://picsum.photos/id/201/1920/1080')"></div>
      <div class="slide absolute inset-0 bg-cover bg-center" style="background-image: url('https://picsum.photos/id/237/1920/1080')"></div>
    </div>

    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-zinc-950/70 to-zinc-950"></div>

    <div class="relative z-10 h-full flex items-center justify-center text-center px-6">
      <div class="max-w-3xl">
        <h2 class="text-6xl md:text-7xl font-bold tracking-tighter logo-font mb-4 neon-text">
          THE BEAT
        </h2>
        <p class="text-xl md:text-2xl text-zinc-300 mb-10">
          Music 
        </p>
        <button onclick="window.scrollTo({top: 900, behavior: 'smooth'})" 
          class="px-10 py-4 bg-white text-zinc-900 rounded-3xl font-semibold text-lg hover:scale-105 transition flex items-center gap-3 mx-auto">
          <i class="fas fa-play"></i>
          MULAI DENGARKAN
        </button>
      </div>
    </div>
  </div>

  <!-- Album Grid -->
  <div class="max-w-7xl mx-auto px-6 py-20">
    <h2 class="text-4xl font-bold mb-12 text-center logo-font tracking-tight">New Releases</h2>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6" id="album-grid"></div>
  </div>

  <!-- JS File -->
  <script src="script-music.js"></script>
</body>
  </html>
