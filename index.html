<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flutemusic gemagus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <script src="https://kit.fontawesome.com/4f3ce163e.js" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
   <link href="css/style-n1.css" rel="stylesheet">

</head>
<body>

<div class="rig">

  <div class="head">
    <div class="logo">Flute<span>🌐</span>Music</div>
    <div class="status"><span class="dot-live"></span> <span id="statusText">STANDBY</span></div>
  </div>

  <div class="main">

    <!-- LEFT: -->
    <div class="scene-wrap">
      <div class="scene" id="scene">
        <div class="slide active" id="slide0">
          <div class="sun" style="--s1:#ffca3a;--s2:#ff2a6d;"></div>
          <div class="grid-floor" style="--s3:#05d9e8;"></div>
          <div class="scanline-scene"></div>
        </div>
        <div class="slide" id="slide1">
          <div class="sun" style="--s1:#05d9e8;--s2:#9d4edd;"></div>
          <div class="grid-floor" style="--s3:#ff2a6d;"></div>
          <div class="scanline-scene"></div>
        </div>
        <div class="slide" id="slide2">
          <div class="sun" style="--s1:#9d4edd;--s2:#ff7a3d;"></div>
          <div class="grid-floor" style="--s3:#ffca3a;"></div>
          <div class="scanline-scene"></div>
        </div>
        <div class="scene-badge" id="sceneBadge">TRK.01</div>
        <div class="scene-dots" id="sceneDots"></div>
      </div>

      <div class="track-meta">
        <div class="track-title" id="trackTitle">Pilih</div>
        <div class="track-artist" id="trackArtist">LAGU</div>
      </div>

      <canvas id="viz"></canvas>

      <div class="transport">
        <div class="transport-row">
          <button class="tbtn mode-btn" id="shuffleBtn" title="Shuffle">
            <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04z"/></svg>
          </button>
          <button class="tbtn" id="prevBtn" title="Previous">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6L18 6v12z"/></svg>
          </button>
          <button class="tbtn play" id="playBtn" title="Play/Pause">
            <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="tbtn" id="nextBtn" title="Next">
            <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
          </button>
          <button class="tbtn mode-btn" id="repeatBtn" title="Repeat">
            <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2z"/></svg>
            <span class="repeat-badge" id="repeatBadge">1</span>
          </button>
          <div class="progress-wrap">
            <span id="tCur">00:00</span>
            <div class="bar" id="barTrack"><div class="bar-fill" id="barFill"></div></div>
            <span id="tTotal">00:00</span>
          </div>
        </div>
      </div>

      <div class="playlist" id="playlist"></div>
    </div>

    <!-- RIGHT: EQUALIZER -->
    <div class="eq-wrap">
      <div class="eq-head">
        <div class="eq-title"><b>EQUALIZER</b></div>
        <div class="eq-toggle" id="eqToggleWrap">
          <span class="eq-toggle-label" id="eqToggleLabel">OFF</span>
          <div class="switch" id="eqSwitch"></div>
        </div>
      </div>

      <div class="knobs" id="knobsGrid"></div>

      <div class="master-row">
        <div class="knob-cell" id="volCell">
          <div class="knob" id="volKnob" style="--kc:#ffffff;">
            <div class="knob-indicator" id="volIndicator" style="--kc:#ffffff;"></div>
          </div>
          <div class="knob-label">Volume</div>
          <div class="knob-val" id="volVal">75%</div>
        </div>
        <div class="master-info">
          <div class="lbl">MASTER OUTPUT</div>
          <div class="desc"></div>
        </div>
      </div>

      <div class="hint" id="hintText">◈ Gemagus ◈</div>
    </div>

  </div>
</div>

<audio id="audioEl" crossorigin="anonymous" preload="metadata"></audio>

    <script src="js/Headoom.js"></script>
     <script src="js/jQuery.hearoom.js"></script>
     <script src="js/slikk.min.js"></script>
     <script src="js/Data-lg.js"></script>
</body>
</html>
