<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Glass UI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .glass {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px;
      width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-align: center;
    }

    button {
      margin: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="glass">
    <h2 id="title">Song 1</h2>
    <audio id="audio" src="https://archive.org/details/cinematic_202603"></audio>
    <div>
      <button onclick="playMusic()">Play</button>
      <button onclick="pauseMusic()">Pause</button>
    </div>
    <div>
      <button onclick="nextSong()">Next</button>
      <ul id="playlist"></ul>
    </div>
          <ul id="playlist"></ul>
          <a id="downloadBtn" download>Download</a>
          <iframe src="https://archive.org/embed/whispers-over-the-water-1/Whispers+Over+The+Water+(1).mp3" width="500" height="30" frameborder="0" webkitallowfullscreen="true" mozallowfullscreen="true" allowfullscreen=""></iframe>
  </div>

 <script>
    const songs = [
      {title: "Song 1", src: "https://archive.org/details/cinematic_202603"},
      {title: "Song 2", src: "Cinematic.mp3"}
    ];

    let index = 0;
    const audio = document.getElementById("audio");
    const title = document.getElementById("title");

    function playMusic() {
      audio.play();
    }

    function pauseMusic() {
      audio.pause();
    }

    function nextSong() {
      index = (index + 1) % songs.length;
      audio.src = songs[index].src;
      title.innerText = songs[index].title;
      audio.play();
    }
    const playlist = document.getElementById("playlist");

function renderPlaylist() {
  playlist.innerHTML = "";
  
  songs.forEach((song, i) => {
    const li = document.createElement("li");
    li.innerText = song.title;
    
    li.style.cursor = "pointer";
    li.style.margin = "5px";
    
    li.onclick = () => {
      index = i;
      audio.src = song.src;
      title.innerText = song.title;
      audio.play();
    };

    playlist.appendChild(li);
  });
}

renderPlaylist();

document.getElementById("downloadBtn").href = songs[index].src;
  </script>
</body>
</html>
