
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .music-player {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        .album-art {
            width: 100%;
            height: 350px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .song-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .song-title {
            font-size: 26px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .song-artist {
            font-size: 16px;
            color: #666;
        }

        .progress-container {
            margin-bottom: 25px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            margin-bottom: 10px;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 24px;
        }

        .control-btn:hover {
            transform: scale(1.1);
        }

        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .volume-icon {
            font-size: 20px;
            color: #667eea;
        }

        .volume-slider {
            flex: 1;
            height: 6px;
            border-radius: 10px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }

        .playlist {
            max-height: 200px;
            overflow-y: auto;
            border-radius: 15px;
            background: #f5f5f5;
            padding: 10px;
        }

        .playlist-item {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .playlist-item:hover {
            background: #e0e0e0;
        }

        .playlist-item.active {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .playlist-item-thumbnail {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .playlist-item-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .playlist-item-info {
            flex: 1;
        }

        .playlist-item-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 3px;
        }

        .playlist-item-artist {
            font-size: 12px;
            opacity: 0.8;
        }

        .playlist::-webkit-scrollbar {
            width: 6px;
        }

        .playlist::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="music-player">
        <div class="album-art" id="albumArt">
            <img src="" alt="Album Cover" id="albumImage">
        </div>
        
        <div class="song-info">
            <div class="song-title" id="songTitle">Pilih Lagu</div>
            <div class="song-artist" id="songArtist">Artist</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn" id="prevBtn">⏮️</button>
            <button class="control-btn play-btn" id="playBtn">▶️</button>
            <button class="control-btn" id="nextBtn">⏭️</button>
        </div>

        <div class="volume-container">
            <span class="volume-icon">🔊</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
        </div>

        <div class="playlist" id="playlist"></div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        // Playlist data - GANTI URL IMAGE dengan gambar pribadi Anda
        const songs = [
             {
                title: "music 8D wajib heandset",
                artist: "16 D",
                url: "https://archive.org/download/musik-ajaib-gunakan/MUSIK%20AJAIB%20GUNAKAN%20HEADSET%20%20DJ%208D%20SUPER%20FULL%20BASS%20TERBARU%202025%20%28MHLS%20PRO%29.mp3",
                image: "https://picsum.photos/400/400?random=1" // Ganti dengan URL gambar Anda
            },
            {
                title: "epic",
                artist: "The Waves",
                url: "https://archive.org/download/epic-games_202604/Epic%20Gafgmesgf.mp3",
                image: "https://picsum.photos/400/400?random=1" // Ganti dengan URL gambar Anda
            },
            {
                title: "epic film",
                artist: "Gemagus Star",
                url: "https://archive.org/download/epic-games_202604/Epic%20Gamegsgf.mp3",
                image: "https://picsum.photos/400/400?random=1" // Ganti dengan URL gambar Anda
            },
            {
                title: "Epic film dramatis",
                artist: "fragin",
                url: "https://archive.org/download/epic-games_202604/Epic%20Games.mp3",
                image: "https://picsum.photos/400/400?random=3" // Ganti dengan URL gambar Anda
            },
            {
                title: "Urban epic",
                artist: "Beat Masters",
                url: "https://archive.org/download/epic-games_202604/Epic%20Gamesgf.mp3",
                image: "https://picsum.photos/400/400?random=4" // Ganti dengan URL gambar Anda
            },
              {
                title: "movie epic",
                artist: "Beat Masters",
                url: "https://archive.org/download/epic-games_202604/Epic%20Gamesyy.mp3",
                image: "https://picsum.photos/400/400?random=4" 
            },
              {
                title: "movie epic",
                artist: " Masters",
                url: "https://archive.org/download/epic-games_202604/Epic%20film.mp3",
                image: "https://picsum.photos/400/400?random=4" // Ganti dengan URL gambar Anda
            },
               {
                title: " epic",
                artist: " Masters",
                url: "https://archive.org/download/epic-games_202604/Gms%20fifgflm.mp3",
                image: "https://picsum.photos/400/400?random=4" // Ganti dengan URL gambar Anda
            },
            {
                title: " epic dragon",
                artist: " Masters",
                url: "https://archive.org/download/epic-games_202604/Gms%20film.mp3",
                image: "https://picsum.photos/400/400?random=4" // Ganti dengan URL gambar Anda
            },
               {
                title: " epic film",
                artist: " Masters",
                url: "https://archive.org/download/epic-games_202604/Gms%20film8.mp3",
                image: "https://picsum.photos/400/400?random=4" // Ganti dengan URL gambar Anda
            },
               {
                title: " epic mobie",
                artist: " Masters",
                url: "https://archive.org/download/epic-games_202604/Zip.mp3",
                image: "https://picsum.photos/400/400?random=4" // Ganti dengan URL gambar Anda
            },
        ];

        // Elements
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const albumImage = document.getElementById('albumImage');
        const playlistEl = document.getElementById('playlist');

        let currentSongIndex = 0;
        let isPlaying = false;

        // Initialize playlist
        function renderPlaylist() {
            playlistEl.innerHTML = '';
            songs.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentSongIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="playlist-item-thumbnail">
                        <img src="${song.image}" alt="${song.title}">
                    </div>
                    <div class="playlist-item-info">
                        <div class="playlist-item-title">${song.title}</div>
                        <div class="playlist-item-artist">${song.artist}</div>
                    </div>
                `;
                item.addEventListener('click', () => loadSong(index));
                playlistEl.appendChild(item);
            });
        }

        // Load song
        function loadSong(index) {
            currentSongIndex = index;
            const song = songs[index];
            audioPlayer.src = song.url;
            songTitle.textContent = song.title;
            songArtist.textContent = song.artist;
            albumImage.src = song.image;
            albumImage.alt = song.title;
            renderPlaylist();
        }

        // Play/Pause
        function togglePlay() {
            if (isPlaying) {
                audioPlayer.pause();
                playBtn.textContent = '▶️';
            } else {
                audioPlayer.play();
                playBtn.textContent = '⏸️';
            }
            isPlaying = !isPlaying;
        }

        // Previous song
        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            loadSong(currentSongIndex);
            if (isPlaying) audioPlayer.play();
        }

        // Next song
        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            loadSong(currentSongIndex);
            if (isPlaying) audioPlayer.play();
        }

        // Update progress
        function updateProgress() {
            const { currentTime, duration } = audioPlayer;
            const progressPercent = (currentTime / duration) * 100;
            progress.style.width = `${progressPercent}%`;
            
            currentTimeEl.textContent = formatTime(currentTime);
            if (duration) {
                durationEl.textContent = formatTime(duration);
            }
        }

        // Format time
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // Set progress
        function setProgress(e) {
            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            const duration = audioPlayer.duration;
            audioPlayer.currentTime = (clickX / width) * duration;
        }

        // Set volume
        function setVolume() {
            audioPlayer.volume = volumeSlider.value / 100;
        }

        // Event listeners
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        audioPlayer.addEventListener('timeupdate', updateProgress);
        progressBar.addEventListener('click', setProgress);
        volumeSlider.addEventListener('input', setVolume);
        audioPlayer.addEventListener('ended', nextSong);

        // Initialize
        renderPlaylist();
        loadSong(0);
        setVolume();
    </script>
</body>
</html>
